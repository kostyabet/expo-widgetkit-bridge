name: Weekly example build

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  ios:
    name: iOS example build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install root dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install example dependencies
        working-directory: example
        run: npm install

      - name: Expo prebuild
        working-directory: example
        run: npx expo prebuild --platform ios --clean

      - name: Pod install
        working-directory: example/ios
        run: pod install

      - name: xcodebuild
        working-directory: example/ios
        run: |
          xcodebuild -workspace ExpoWidgetkitBridgeExample.xcworkspace \
            -scheme ExpoWidgetkitBridgeExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty
