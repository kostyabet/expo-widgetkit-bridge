name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  ios-smoke-build:
    name: iOS smoke build (example)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install example dependencies
        working-directory: example
        run: npm install

      - name: Expo prebuild (iOS)
        working-directory: example
        run: npx expo prebuild --platform ios --clean

      - name: Pod install
        working-directory: example/ios
        run: pod install

      - name: xcodebuild
        working-directory: example/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          # The app scheme always matches the workspace name in Expo prebuild output.
          # xcodebuild -list also returns pod schemes (EXConstants, Pods-*, …) which
          # do not have iOS simulator destinations, so we cannot just pick schemes[0].
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
